<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Generation Test</title>
</head>
<body>
  <canvas id="canvas" width="1000" height="1000" style="max-width: 300px; max-height: 300px; border: 1px solid black;"></canvas>
  <script type="module">
    import QRCode from 'https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm';
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const qrData = QRCode.create('ANTIGRAVITY', { errorCorrectionLevel: 'H' });
    const { modules } = qrData;
    const size = modules.size;
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const qrPadding = 64;
    const drawSize = (canvas.width - qrPadding * 2);
    const xStart = (canvas.width - drawSize) / 2;
    const yStart = (canvas.height - drawSize) / 2;
    const cellSize = drawSize / size;
    
    ctx.fillStyle = '#000000';
    
    for (let row = 0; row < size; row++) {
      for (let col = 0; col < size; col++) {
        const isDark = modules.data ? modules.data[row * size + col] : (modules.get && modules.get(row, col));
        if (isDark) {
          const x = xStart + col * cellSize;
          const y = yStart + row * cellSize;
          const w = cellSize;
          const h = cellSize;
          
          ctx.beginPath();
          ctx.arc(x + w/2, y + h/2, w/3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  </script>
</body>
</html>
